name: squadcast
version: 0.1.0
dsl_version: 3
backend: http
description: >-
  Query Squadcast incidents, services, and users via the Squadcast API v3.
  Join with GitHub PRs, Sentry errors, PagerDuty incidents, and Linear issues
  for cross-source SRE and incident management intelligence.
base_url: "{{input.SQUADCAST_API_BASE_URL}}"

inputs:
  SQUADCAST_TOKEN:
    kind: secret
    hint: |
      A Squadcast access token. Obtain one from the Squadcast web app under
      Profile -> Access Tokens, or exchange a refresh token for an access token
      via the Squadcast auth endpoint.

      To exchange a refresh token:
        curl -X POST https://auth.squadcast.com/oauth/access-token \
          -H "X-Refresh-Token: <your-refresh-token>"

      The returned access_token value is what you set here. Tokens expire
      after 1 hour; re-run `coral source add --file sources/community/squadcast/manifest.yaml`
      to refresh.

      See https://apidocs.squadcast.com/
  SQUADCAST_API_BASE_URL:
    kind: variable
    default: https://api.squadcast.com
    hint: |
      Base URL for the Squadcast API. Defaults to the US region
      (https://api.squadcast.com). For EU accounts use
      https://api.eu.squadcast.com.
  SQUADCAST_OWNER_ID:
    kind: variable
    hint: |
      Your Squadcast account owner ID. Find it in the Squadcast web app under
      Settings -> General Settings -> Organization ID. Required for querying
      incidents and services.

auth:
  type: HeaderAuth
  headers:
    - name: Authorization
      from: template
      template: "Bearer {{input.SQUADCAST_TOKEN}}"

request_headers:
  - name: Accept
    from: literal
    value: application/json

rate_limit:
  extra_statuses:
    - 429
  retry_after_header: Retry-After

test_queries:
  - SELECT id, name FROM squadcast.services LIMIT 1

tables:
  - name: incidents
    description: >-
      Exports Squadcast incidents for a given time window via the incidents
      export endpoint. Returns incident ID, title, description, status,
      severity, service, assignee, triggered and resolved timestamps, and
      the alert source that triggered each incident.
    guide: |
      Requires start_time, end_time (ISO 8601, e.g. 2025-01-01T00:00:00Z),
      and the SQUADCAST_OWNER_ID input set at source-add time. Use the
      status filter to scope to triggered, acknowledged, resolved, or
      suppressed incidents. Join service_id with squadcast.services and
      email with squadcast.users. Join triggered_at with GitHub deploy
      created_at or Sentry first_seen to correlate incidents with code
      changes and errors.
    filters:
      - name: start_time
        required: true
      - name: end_time
        required: true
      - name: status
        required: false
    request:
      method: GET
      path: /v3/incidents/export
      query:
        - name: owner_id
          from: input
          key: SQUADCAST_OWNER_ID
        - name: start_time
          from: filter
          key: start_time
        - name: end_time
          from: filter
          key: end_time
        - name: type
          from: literal
          value: json
        - name: status
          from: filter
          key: status
    response:
      rows_path:
        - data
    pagination:
      mode: none
    columns:
      - name: id
        type: Utf8
        nullable: false
        description: Unique incident ID.
        expr:
          kind: path
          path:
            - id
      - name: title
        type: Utf8
        nullable: true
        description: Incident title as triggered by the alert source.
        expr:
          kind: path
          path:
            - title
      - name: description
        type: Utf8
        nullable: true
        description: Incident description or alert message body.
        expr:
          kind: path
          path:
            - description
      - name: status
        type: Utf8
        nullable: true
        description: >-
          Incident status: triggered, acknowledged, resolved, or suppressed.
        expr:
          kind: path
          path:
            - status
      - name: severity
        type: Utf8
        nullable: true
        description: Incident severity level (critical, high, medium, or low).
        expr:
          kind: path
          path:
            - severity
      - name: service_id
        type: Utf8
        nullable: true
        description: ID of the Squadcast service that owns this incident; join to squadcast.services.
        expr:
          kind: path
          path:
            - service
            - id
      - name: service_name
        type: Utf8
        nullable: true
        description: Name of the service that owns this incident.
        expr:
          kind: path
          path:
            - service
            - name
      - name: assignee_id
        type: Utf8
        nullable: true
        description: ID of the user currently assigned to this incident.
        expr:
          kind: path
          path:
            - assignee
            - id
      - name: assignee_name
        type: Utf8
        nullable: true
        description: Display name of the user currently assigned to this incident.
        expr:
          kind: path
          path:
            - assignee
            - name
      - name: triggered_at
        type: Utf8
        nullable: true
        description: ISO 8601 timestamp when the incident was triggered.
        expr:
          kind: path
          path:
            - triggered_at
      - name: acknowledged_at
        type: Utf8
        nullable: true
        description: ISO 8601 timestamp when the incident was first acknowledged; null if not yet acknowledged.
        expr:
          kind: path
          path:
            - acknowledged_at
      - name: resolved_at
        type: Utf8
        nullable: true
        description: ISO 8601 timestamp when the incident was resolved; null if still open.
        expr:
          kind: path
          path:
            - resolved_at
      - name: alert_source
        type: Utf8
        nullable: true
        description: Name of the integration or alert source that triggered the incident.
        expr:
          kind: path
          path:
            - alert_source
            - name
      - name: raw
        type: Json
        nullable: true
        description: Raw incident object.
        expr:
          kind: current_row

  - name: services
    description: >-
      Lists all Squadcast services for the account. Returns service ID, name,
      description, escalation policy, on-call users, and status.
    guide: |
      Use id to join with service_id on squadcast.incidents to group incidents
      by service. Join name with GitHub repository names or Sentry project slugs
      for cross-source service identity. Requires SQUADCAST_OWNER_ID set at
      source-add time.
    request:
      method: GET
      path: /v3/services
      query:
        - name: owner_id
          from: input
          key: SQUADCAST_OWNER_ID
    response:
      rows_path:
        - data
    pagination:
      mode: none
    columns:
      - name: id
        type: Utf8
        nullable: false
        description: Unique service ID; join to service_id on squadcast.incidents.
        expr:
          kind: path
          path:
            - id
      - name: name
        type: Utf8
        nullable: true
        description: Service display name; join with Sentry project slugs or GitHub repo names.
        expr:
          kind: path
          path:
            - name
      - name: description
        type: Utf8
        nullable: true
        description: Service description.
        expr:
          kind: path
          path:
            - description
      - name: escalation_policy
        type: Utf8
        nullable: true
        description: Name of the escalation policy assigned to this service.
        expr:
          kind: path
          path:
            - escalation_policy
            - name
      - name: on_call_now
        type: Json
        nullable: true
        description: Array of users currently on call for this service.
        expr:
          kind: path
          path:
            - on_call_now
      - name: status
        type: Utf8
        nullable: true
        description: Service health status.
        expr:
          kind: path
          path:
            - status
      - name: raw
        type: Json
        nullable: true
        description: Raw service object.
        expr:
          kind: current_row

  - name: users
    description: >-
      Lists all users in the Squadcast account. Returns user ID, first and last
      name, display username, email address, and account role.
    guide: |
      Use email to join with GitHub PR authors, Linear assignees, and
      PagerDuty users for cross-source engineer identity resolution. Join
      id with assignee_id on squadcast.incidents. username_for_display is
      the display name used in Squadcast notifications and the UI.
    request:
      method: GET
      path: /v3/users
    response:
      rows_path:
        - data
    pagination:
      mode: none
    columns:
      - name: id
        type: Utf8
        nullable: false
        description: Unique user ID; join to assignee_id on squadcast.incidents.
        expr:
          kind: path
          path:
            - id
      - name: first_name
        type: Utf8
        nullable: true
        description: User first name.
        expr:
          kind: path
          path:
            - first_name
      - name: last_name
        type: Utf8
        nullable: true
        description: User last name.
        expr:
          kind: path
          path:
            - last_name
      - name: username_for_display
        type: Utf8
        nullable: true
        description: Display username shown in Squadcast notifications and the UI.
        expr:
          kind: path
          path:
            - username_for_display
      - name: email
        type: Utf8
        nullable: true
        description: User email address; primary join key with GitHub, Linear, and PagerDuty.
        expr:
          kind: path
          path:
            - email
      - name: role
        type: Utf8
        nullable: true
        description: Account role (account_owner, user, or stakeholder).
        expr:
          kind: path
          path:
            - role
      - name: raw
        type: Json
        nullable: true
        description: Raw user object.
        expr:
          kind: current_row
