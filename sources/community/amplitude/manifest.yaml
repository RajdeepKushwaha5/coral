name: amplitude
version: 1.0.0
dsl_version: 3
backend: http
description: >-
  Query Amplitude Analytics as SQL tables. Browse your full event catalog,
  timeline annotations, and per-user activity logs. Join with GitHub, Linear,
  or any other Coral source for cross-source product intelligence.

base_url: "{{input.AMPLITUDE_BASE_URL}}"

inputs:
  AMPLITUDE_BASE_URL:
    kind: variable
    default: https://amplitude.com/api
    hint: |
      Amplitude API base URL. Defaults to the US region.
      For EU data residency use: https://analytics.eu.amplitude.com/api
      See https://amplitude.com/docs/apis/analytics/dashboard-rest#regions
  AMPLITUDE_API_KEY:
    kind: secret
    hint: |
      Your Amplitude project API key.
      Go to Settings → Projects → select your project → API key.
      See https://www.docs.developers.amplitude.com/analytics/apis/dashboard-rest-api/
  AMPLITUDE_SECRET_KEY:
    kind: secret
    hint: |
      Your Amplitude project Secret key.
      Go to Settings → Projects → select your project → Secret key.
      Keep this safe — it is equivalent to a password.

auth:
  type: BasicAuth
  username: "{{input.AMPLITUDE_API_KEY}}"
  password: "{{input.AMPLITUDE_SECRET_KEY}}"

rate_limit:
  extra_statuses:
    - 429
  retry_after_header: Retry-After

test_queries:
  - SELECT value, totals FROM amplitude.events ORDER BY totals DESC LIMIT 1

functions:
  - name: user_activity
    description: >-
      Return all recorded events for a specific Amplitude user. Pass the
      Amplitude-assigned numeric user ID. For device or app user ID lookup,
      use Amplitude's User Search API first to resolve the Amplitude ID.
      Useful for debugging user journeys or support investigations.
    fetch_limit_default: 1000
    args:
      - name: user_id
        required: true
        bind:
          arg: user_id
    request:
      method: GET
      path: /2/useractivity
      query:
        - name: user
          from: arg
          key: user_id
    response:
      rows_path:
        - events
    pagination:
      mode: none
    columns:
      - name: event_type
        type: Utf8
        nullable: false
        description: Name of the event as tracked in Amplitude
        expr:
          kind: path
          path:
            - event_type
      - name: client_event_time
        type: Utf8
        nullable: true
        description: Client-side timestamp when the event was recorded (ISO 8601)
        expr:
          kind: path
          path:
            - client_event_time
      - name: server_upload_time
        type: Utf8
        nullable: true
        description: Server-side timestamp when Amplitude received the event (ISO 8601)
        expr:
          kind: path
          path:
            - server_upload_time
      - name: event_id
        type: Int64
        nullable: true
        description: Unique numeric event ID within the user's session
        expr:
          kind: path
          path:
            - event_id
      - name: session_id
        type: Int64
        nullable: true
        description: Session ID grouping related events together
        expr:
          kind: path
          path:
            - session_id
      - name: amplitude_id
        type: Int64
        nullable: true
        description: Amplitude-assigned numeric identifier for the user
        expr:
          kind: path
          path:
            - amplitude_id
      - name: user_id
        type: Utf8
        nullable: true
        description: Your application's user identifier
        expr:
          kind: path
          path:
            - user_id
      - name: device_id
        type: Utf8
        nullable: true
        description: Device identifier at event time
        expr:
          kind: path
          path:
            - device_id
      - name: platform
        type: Utf8
        nullable: true
        description: Platform (e.g. Web, iOS, Android)
        expr:
          kind: path
          path:
            - platform
      - name: os_name
        type: Utf8
        nullable: true
        description: Operating system name
        expr:
          kind: path
          path:
            - os_name
      - name: device_type
        type: Utf8
        nullable: true
        description: Device type or model
        expr:
          kind: path
          path:
            - device_type
      - name: country
        type: Utf8
        nullable: true
        description: Country derived from IP address
        expr:
          kind: path
          path:
            - country
      - name: city
        type: Utf8
        nullable: true
        description: City derived from IP address
        expr:
          kind: path
          path:
            - city
      - name: ip_address
        type: Utf8
        nullable: true
        description: IP address recorded at event time
        expr:
          kind: path
          path:
            - ip_address
      - name: event_properties
        type: Json
        nullable: true
        description: Raw event properties as a JSON object
        expr:
          kind: path
          path:
            - event_properties
      - name: user_properties
        type: Json
        nullable: true
        description: Raw user properties snapshot at event time as a JSON object
        expr:
          kind: path
          path:
            - user_properties

tables:
  - name: events
    description: >-
      All event types tracked in the Amplitude project. Returns one row per
      event type with total occurrence counts and visibility flags.
      Uses GET /api/2/events/list (Dashboard REST API v2).
      Use value to match event names when querying user_activity.
    guide: |
      No filters required. Returns all visible event types for the project.

      value is the raw event name used in user_activity queries.
      display is the human-readable name shown in the Amplitude UI.

      Example:
        SELECT value, display, totals
        FROM amplitude.events
        ORDER BY totals DESC
        LIMIT 20
    request:
      method: GET
      path: /2/events/list
    response:
      rows_path:
        - data
    pagination:
      mode: none
    columns:
      - name: value
        type: Utf8
        nullable: false
        description: Raw event name as stored in Amplitude data
        expr:
          kind: path
          path:
            - value
      - name: display
        type: Utf8
        nullable: true
        description: Human-readable display name shown in the Amplitude UI
        expr:
          kind: path
          path:
            - display
      - name: totals
        type: Int64
        nullable: true
        description: Total event count for the current week
        expr:
          kind: path
          path:
            - totals
      - name: non_active
        type: Boolean
        nullable: true
        description: True if the event is marked inactive in Amplitude
        expr:
          kind: path
          path:
            - non_active
      - name: deleted
        type: Boolean
        nullable: true
        description: True if the event type has been deleted from the project
        expr:
          kind: path
          path:
            - deleted
      - name: hidden
        type: Boolean
        nullable: true
        description: True if the event type is hidden from the Amplitude UI
        expr:
          kind: path
          path:
            - hidden
      - name: flow_hidden
        type: Boolean
        nullable: true
        description: True if the event is hidden from Pathfinder and flow charts
        expr:
          kind: path
          path:
            - flow_hidden

  - name: annotations
    description: >-
      Timeline annotation markers for the Amplitude project. Each row is one
      annotation with start/end timestamps, label, and optional details.
      Uses GET /api/3/annotations (Chart Annotations API v3).
      Useful for correlating metric changes with known events such as
      deployments, marketing campaigns, or incidents.
    guide: |
      No filters required. Returns all annotations for the project.

      start and end are ISO 8601 timestamps. end is null for single-day annotations.
      category_name is the annotation category label, or null if uncategorized.

      Example:
        SELECT start, label, details, category_name
        FROM amplitude.annotations
        ORDER BY start DESC
    request:
      method: GET
      path: /3/annotations
    response:
      rows_path:
        - data
    pagination:
      mode: none
    columns:
      - name: id
        type: Int64
        nullable: false
        description: Unique numeric annotation ID
        expr:
          kind: path
          path:
            - id
      - name: start
        type: Utf8
        nullable: false
        description: ISO 8601 timestamp for the annotation start date
        expr:
          kind: path
          path:
            - start
      - name: end
        type: Utf8
        nullable: true
        description: ISO 8601 timestamp for the annotation end date (null for single-day annotations)
        expr:
          kind: path
          path:
            - end
      - name: label
        type: Utf8
        nullable: false
        description: Short title for the annotation
        expr:
          kind: path
          path:
            - label
      - name: details
        type: Utf8
        nullable: true
        description: Optional longer description of the annotation
        expr:
          kind: path
          path:
            - details
      - name: chart_id
        type: Utf8
        nullable: true
        description: Chart this annotation is scoped to, or null if project-wide
        expr:
          kind: path
          path:
            - chart_id
      - name: category_name
        type: Utf8
        nullable: true
        description: Category name for this annotation (from the nested category object)
        expr:
          kind: path
          path:
            - category
            - name
