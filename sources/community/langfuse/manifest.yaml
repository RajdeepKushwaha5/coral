name: langfuse
version: 0.2.0
dsl_version: 3
backend: http
description: >-
  Query traces, observations, scores, sessions, and projects from Langfuse
  (Cloud or self-hosted). Join with Linear, GitHub, and Sentry for cross-source
  AI cost attribution — link every dollar of LLM spend to the feature it shipped.

inputs:
  LANGFUSE_BASE_URL:
    kind: variable
    default: https://cloud.langfuse.com
    hint: |
      Base URL of your Langfuse instance.
      Cloud regions:
        EU:    https://cloud.langfuse.com  (default)
        US:    https://us.cloud.langfuse.com
        Japan: https://jp.cloud.langfuse.com
      For self-hosted instances use your own URL (e.g. http://localhost:3000).
  LANGFUSE_PUBLIC_KEY:
    kind: secret
    hint: |
      Your Langfuse project public key. Find it in your project settings
      under API Keys. Used as the HTTP Basic Auth username.
      See https://langfuse.com/docs/api
  LANGFUSE_SECRET_KEY:
    kind: secret
    hint: |
      Your Langfuse project secret key. Find it in your project settings
      under API Keys. Used as the HTTP Basic Auth password.
      See https://langfuse.com/docs/api

base_url: "{{input.LANGFUSE_BASE_URL}}"

auth:
  type: BasicAuth
  username: "{{input.LANGFUSE_PUBLIC_KEY}}"
  password: "{{input.LANGFUSE_SECRET_KEY}}"

rate_limit:
  extra_statuses:
    - 429
  retry_after_header: Retry-After

test_queries:
  - SELECT id, name FROM langfuse.projects LIMIT 1
  - SELECT id, name, total_cost FROM langfuse.traces ORDER BY timestamp DESC LIMIT 1

tables:
  - name: projects
    description: Langfuse projects accessible with the API keys.
    guide: |
      Start here to confirm connectivity and inspect project metadata.
      Each row is one Langfuse project. The id field can be used to
      scope downstream queries.
    request:
      method: GET
      path: /api/public/projects
    response:
      rows_path:
        - data
      allow_404_empty: false
      row_strategy: direct
    pagination:
      mode: none
    columns:
      - name: id
        type: Utf8
        nullable: false
        description: Project ID
        expr:
          kind: path
          path:
            - id
      - name: name
        type: Utf8
        nullable: false
        description: Project name
        expr:
          kind: path
          path:
            - name
      - name: created_at
        type: Utf8
        nullable: true
        description: Timestamp when the project was created (ISO 8601)
        expr:
          kind: path
          path:
            - createdAt

  - name: traces
    description: >-
      LLM application traces recorded in the project. Each row is one trace —
      a top-level request through your LLM application. Includes token cost,
      latency, user, session, release, environment, and the custom metadata
      your app attaches to each trace. Use metadata to link traces to Linear
      tickets, GitHub PRs, or other business context.
    guide: |
      Each row is one trace. Join id to observations.trace_id to get
      individual spans and generations. Use from_timestamp / to_timestamp
      to limit the time window for large projects.

      To attribute AI spend to Linear tickets, instrument your app to set
      trace metadata before querying:
        langfuse.trace({ metadata: { linearId: "LIN-123", featureTag: "billing-agent" } })
      Then query:
        SELECT name, total_cost, json_get_str(metadata, 'linearId') AS ticket
        FROM langfuse.traces

      status values: OPTIMISTIC (default), SCHEDULED, PROCESSING, COMPLETED, ERROR
    fetch_limit_default: 500
    filters:
      - name: user_id
        required: false
      - name: name
        required: false
      - name: session_id
        required: false
      - name: tags
        required: false
      - name: environment
        required: false
      - name: from_timestamp
        required: false
      - name: to_timestamp
        required: false
    request:
      method: GET
      path: /api/public/traces
      query:
        - name: userId
          from: filter
          key: user_id
        - name: name
          from: filter
          key: name
        - name: sessionId
          from: filter
          key: session_id
        - name: tags
          from: filter
          key: tags
        - name: environment
          from: filter
          key: environment
        - name: fromTimestamp
          from: filter
          key: from_timestamp
        - name: toTimestamp
          from: filter
          key: to_timestamp
    response:
      rows_path:
        - data
      allow_404_empty: false
      row_strategy: direct
    pagination:
      mode: page
      page_param: page
      page_start: 1
      page_step: 1
      offset_start: 0
      page_size:
        default: 50
        max: 100
        query_param: limit
      link_header_require_results: false
    columns:
      - name: id
        type: Utf8
        nullable: false
        description: Trace ID
        expr:
          kind: path
          path:
            - id
      - name: name
        type: Utf8
        nullable: true
        description: Trace name — identifies the use case or feature (e.g. customer-rag-pipeline)
        expr:
          kind: path
          path:
            - name
      - name: user_id
        type: Utf8
        nullable: true
        description: User ID associated with this trace
        expr:
          kind: path
          path:
            - userId
      - name: session_id
        type: Utf8
        nullable: true
        description: Session ID for grouping multi-turn conversations
        expr:
          kind: path
          path:
            - sessionId
      - name: environment
        type: Utf8
        nullable: true
        description: Deployment environment (e.g. production, staging)
        expr:
          kind: path
          path:
            - environment
      - name: release
        type: Utf8
        nullable: true
        description: Application release version
        expr:
          kind: path
          path:
            - release
      - name: version
        type: Utf8
        nullable: true
        description: Application version
        expr:
          kind: path
          path:
            - version
      - name: tags
        type: Utf8
        nullable: true
        description: Tags attached to this trace (JSON array)
        expr:
          kind: path
          path:
            - tags
      - name: timestamp
        type: Utf8
        nullable: true
        description: Timestamp when the trace was recorded (ISO 8601)
        expr:
          kind: path
          path:
            - timestamp
      - name: latency
        type: Float64
        nullable: true
        description: End-to-end latency in seconds
        expr:
          kind: path
          path:
            - latency
      - name: total_cost
        type: Float64
        nullable: true
        description: Total cost in USD across all observations in this trace
        expr:
          kind: path
          path:
            - totalCost
      - name: metadata
        type: Json
        nullable: true
        description: >-
          Custom metadata attached by your application (JSON object). Use
          json_get_str(metadata, 'linearId') to extract fields. Instrument
          your app with langfuse.trace({ metadata: { linearId: '...' } }).
        expr:
          kind: path
          path:
            - metadata
      - name: input
        type: Json
        nullable: true
        description: Input payload sent to the LLM application for this trace (JSON)
        expr:
          kind: path
          path:
            - input
      - name: output
        type: Json
        nullable: true
        description: Output returned by the LLM application for this trace (JSON)
        expr:
          kind: path
          path:
            - output
      - name: project_id
        type: Utf8
        nullable: true
        description: Project ID this trace belongs to
        expr:
          kind: path
          path:
            - projectId
      - name: created_at
        type: Utf8
        nullable: true
        description: Timestamp when the trace record was created (ISO 8601)
        expr:
          kind: path
          path:
            - createdAt
      - name: updated_at
        type: Utf8
        nullable: true
        description: Timestamp when the trace record was last updated (ISO 8601)
        expr:
          kind: path
          path:
            - updatedAt

  - name: observations
    description: >-
      Spans, generations, and events within traces. Each row is one observation —
      a span, generation, or event inside a trace. Use type = 'GENERATION' to focus
      on individual LLM calls with model name, token counts, and cost per call.
    guide: |
      Filter by type = 'GENERATION' to get only LLM calls. Filter by trace_id
      to get all observations for a specific trace. Use from_start_time /
      to_start_time to limit the time window. Join trace_id to traces.id to get
      trace-level metadata such as the linked Linear ticket or feature tag.

      model values include: claude-opus-4, claude-sonnet-4, claude-haiku-4,
      gpt-4o, gpt-4-turbo, gpt-3.5-turbo, gemini-2.0-flash, and others.

      total_cost is the USD cost for this single LLM call. High total_tokens
      on a low-complexity task suggests model mismatch waste.
    fetch_limit_default: 1000
    filters:
      - name: trace_id
        required: false
      - name: type
        required: false
      - name: name
        required: false
      - name: user_id
        required: false
      - name: environment
        required: false
      - name: model
        required: false
      - name: from_start_time
        required: false
      - name: to_start_time
        required: false
    request:
      method: GET
      path: /api/public/observations
      query:
        - name: traceId
          from: filter
          key: trace_id
        - name: type
          from: filter
          key: type
        - name: name
          from: filter
          key: name
        - name: userId
          from: filter
          key: user_id
        - name: environment
          from: filter
          key: environment
        - name: model
          from: filter
          key: model
        - name: fromStartTime
          from: filter
          key: from_start_time
        - name: toStartTime
          from: filter
          key: to_start_time
    response:
      rows_path:
        - data
      allow_404_empty: false
      row_strategy: direct
    pagination:
      mode: page
      page_param: page
      page_start: 1
      page_step: 1
      offset_start: 0
      page_size:
        default: 50
        max: 100
        query_param: limit
      link_header_require_results: false
    columns:
      - name: id
        type: Utf8
        nullable: false
        description: Observation ID
        expr:
          kind: path
          path:
            - id
      - name: trace_id
        type: Utf8
        nullable: true
        description: Parent trace ID — join to langfuse.traces on id
        expr:
          kind: path
          path:
            - traceId
      - name: type
        type: Utf8
        nullable: true
        description: Observation type (SPAN, GENERATION, or EVENT)
        expr:
          kind: path
          path:
            - type
      - name: name
        type: Utf8
        nullable: true
        description: Observation name
        expr:
          kind: path
          path:
            - name
      - name: model
        type: Utf8
        nullable: true
        description: Model name used for this generation (e.g. claude-opus-4, gpt-4o)
        expr:
          kind: path
          path:
            - model
      - name: model_parameters
        type: Utf8
        nullable: true
        description: Model parameters as a JSON object (temperature, max_tokens, etc.)
        expr:
          kind: path
          path:
            - modelParameters
      - name: start_time
        type: Utf8
        nullable: true
        description: Observation start timestamp (ISO 8601)
        expr:
          kind: path
          path:
            - startTime
      - name: end_time
        type: Utf8
        nullable: true
        description: Observation end timestamp (ISO 8601)
        expr:
          kind: path
          path:
            - endTime
      - name: latency
        type: Float64
        nullable: true
        description: Observation latency in seconds
        expr:
          kind: path
          path:
            - latency
      - name: input_tokens
        type: Int64
        nullable: true
        description: Number of input (prompt) tokens
        expr:
          kind: path
          path:
            - usage
            - input
      - name: output_tokens
        type: Int64
        nullable: true
        description: Number of output (completion) tokens
        expr:
          kind: path
          path:
            - usage
            - output
      - name: total_tokens
        type: Int64
        nullable: true
        description: Total tokens (input + output)
        expr:
          kind: path
          path:
            - usage
            - total
      - name: input_cost
        type: Float64
        nullable: true
        description: Calculated input cost in USD
        expr:
          kind: path
          path:
            - calculatedInputCost
      - name: output_cost
        type: Float64
        nullable: true
        description: Calculated output cost in USD
        expr:
          kind: path
          path:
            - calculatedOutputCost
      - name: total_cost
        type: Float64
        nullable: true
        description: Calculated total cost in USD for this single LLM call
        expr:
          kind: path
          path:
            - calculatedTotalCost
      - name: level
        type: Utf8
        nullable: true
        description: Log level (DEBUG, DEFAULT, WARNING, ERROR)
        expr:
          kind: path
          path:
            - level
      - name: status_message
        type: Utf8
        nullable: true
        description: Status message or error description
        expr:
          kind: path
          path:
            - statusMessage
      - name: version
        type: Utf8
        nullable: true
        description: Version tag on this observation
        expr:
          kind: path
          path:
            - version
      - name: environment
        type: Utf8
        nullable: true
        description: Deployment environment
        expr:
          kind: path
          path:
            - environment
      - name: created_at
        type: Utf8
        nullable: true
        description: Timestamp when the observation was created (ISO 8601)
        expr:
          kind: path
          path:
            - createdAt
      - name: updated_at
        type: Utf8
        nullable: true
        description: Timestamp when the observation was last updated (ISO 8601)
        expr:
          kind: path
          path:
            - updatedAt

  - name: scores
    description: >-
      Evaluation scores attached to traces or observations. Each row is one score —
      a numeric or categorical evaluation from human annotation, LLM judges, or
      custom SDK calls. Use to track quality, relevance, hallucination rate, and
      other LLM evaluation metrics over time.
    guide: |
      Use data_type = 'NUMERIC' for numeric scores and 'CATEGORICAL' for label-based
      scores. Filter by trace_id to see all scores for a specific trace. Filter by
      name to track a specific evaluation dimension across all traces.

      source values: API (SDK calls), ANNOTATION (human), EVAL (LLM judge)
    fetch_limit_default: 500
    filters:
      - name: trace_id
        required: false
      - name: observation_id
        required: false
      - name: name
        required: false
      - name: data_type
        required: false
      - name: environment
        required: false
    request:
      method: GET
      path: /api/public/v2/scores
      query:
        - name: traceId
          from: filter
          key: trace_id
        - name: observationId
          from: filter
          key: observation_id
        - name: name
          from: filter
          key: name
        - name: dataType
          from: filter
          key: data_type
        - name: environment
          from: filter
          key: environment
    response:
      rows_path:
        - data
      allow_404_empty: false
      row_strategy: direct
    pagination:
      mode: page
      page_param: page
      page_start: 1
      page_step: 1
      offset_start: 0
      page_size:
        default: 50
        max: 100
        query_param: limit
      link_header_require_results: false
    columns:
      - name: id
        type: Utf8
        nullable: false
        description: Score ID
        expr:
          kind: path
          path:
            - id
      - name: trace_id
        type: Utf8
        nullable: true
        description: Trace ID this score is attached to
        expr:
          kind: path
          path:
            - traceId
      - name: observation_id
        type: Utf8
        nullable: true
        description: Observation ID this score is attached to (if observation-level)
        expr:
          kind: path
          path:
            - observationId
      - name: name
        type: Utf8
        nullable: false
        description: Score name (e.g. quality, relevance, hallucination)
        expr:
          kind: path
          path:
            - name
      - name: value
        type: Float64
        nullable: true
        description: Numeric score value (null for categorical scores)
        expr:
          kind: path
          path:
            - value
      - name: string_value
        type: Utf8
        nullable: true
        description: Categorical score label (null for numeric scores)
        expr:
          kind: path
          path:
            - stringValue
      - name: data_type
        type: Utf8
        nullable: true
        description: Score data type (NUMERIC, CATEGORICAL, or BOOLEAN)
        expr:
          kind: path
          path:
            - dataType
      - name: source
        type: Utf8
        nullable: true
        description: Score source (API, ANNOTATION, or EVAL)
        expr:
          kind: path
          path:
            - source
      - name: comment
        type: Utf8
        nullable: true
        description: Optional comment on the score
        expr:
          kind: path
          path:
            - comment
      - name: environment
        type: Utf8
        nullable: true
        description: Deployment environment
        expr:
          kind: path
          path:
            - environment
      - name: created_at
        type: Utf8
        nullable: true
        description: Timestamp when the score was created (ISO 8601)
        expr:
          kind: path
          path:
            - createdAt
      - name: updated_at
        type: Utf8
        nullable: true
        description: Timestamp when the score was last updated (ISO 8601)
        expr:
          kind: path
          path:
            - updatedAt

  - name: sessions
    description: >-
      Multi-turn conversation sessions grouping related traces. Each row is one
      session — a group of traces from the same user interaction or workflow.
    guide: |
      Use id to filter traces by session: WHERE session_id = '<id>' on the traces
      table. Sessions are useful for tracking multi-turn conversations and
      computing per-session cost and latency aggregates.
    fetch_limit_default: 200
    filters:
      - name: environment
        required: false
    request:
      method: GET
      path: /api/public/sessions
      query:
        - name: environment
          from: filter
          key: environment
    response:
      rows_path:
        - data
      allow_404_empty: false
      row_strategy: direct
    pagination:
      mode: page
      page_param: page
      page_start: 1
      page_step: 1
      offset_start: 0
      page_size:
        default: 50
        max: 100
        query_param: limit
      link_header_require_results: false
    columns:
      - name: id
        type: Utf8
        nullable: false
        description: Session ID
        expr:
          kind: path
          path:
            - id
      - name: created_at
        type: Utf8
        nullable: true
        description: Timestamp when the session was created (ISO 8601)
        expr:
          kind: path
          path:
            - createdAt
      - name: updated_at
        type: Utf8
        nullable: true
        description: Timestamp when the session was last updated (ISO 8601)
        expr:
          kind: path
          path:
            - updatedAt
      - name: project_id
        type: Utf8
        nullable: true
        description: Project ID this session belongs to
        expr:
          kind: path
          path:
            - projectId
      - name: environment
        type: Utf8
        nullable: true
        virtual: true
        description: Echoes the environment filter applied to this query
        expr:
          kind: from_filter
          key: environment
